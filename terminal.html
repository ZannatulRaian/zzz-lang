<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zzz — terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0c0b10;
            --term-bg: #111018;
            --border: #252336;
            --fg: #ddd8cf;
            --muted: #706c82;
            --accent: #d4943a;
            --green: #6db99a;
            --red: #c75050;
            --dim: #45425a;
            --topbar-bg: #181724;
        }
        html.light {
            --bg: #f4f4f6;
            --term-bg: #ffffff;
            --border: #e2e2e6;
            --fg: #111118;
            --muted: #777788;
            --accent: #b8751f;
            --green: #3a8a68;
            --red: #b03030;
            --dim: #b0b0be;
            --topbar-bg: #f4f4f6;
        }

        /* Theme toggle button */
        .theme-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 10px;
            color: var(--muted);
            font-size: 11px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        .theme-btn:hover { color: var(--fg); border-color: var(--accent); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--fg);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mono { font-family: 'Fira Code', monospace; }

        .term-shell {
            width: 100%;
            max-width: 820px;
            height: 90vh;
            max-height: 700px;
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: var(--term-bg);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,148,58,0.06);
        }

        .term-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 18px;
            background: var(--topbar-bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .term-dots { display: flex; gap: 7px; }
        .tdot { width: 11px; height: 11px; border-radius: 50%; }
        .tdot.r { background: #e05555; }
        .tdot.y { background: #d4943a; }
        .tdot.g { background: #6db99a; }
        .term-label {
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.03em;
        }
        .term-links { display: flex; gap: 16px; }
        .term-links a {
            font-size: 12px;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .term-links a:hover { color: var(--fg); }

        .term-output {
            flex: 1;
            overflow-y: auto;
            padding: 18px 22px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.9;
        }
        .term-output::-webkit-scrollbar { width: 4px; }
        .term-output::-webkit-scrollbar-track { background: transparent; }
        .term-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .term-bottom {
            display: flex;
            align-items: center;
            padding: 12px 22px 16px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--term-bg);
        }
        .term-prompt-text {
            color: var(--accent);
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            white-space: nowrap;
            user-select: none;
        }
        .term-field {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--fg);
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            caret-color: var(--accent);
            padding: 0;
            margin-left: 8px;
        }

        .c-echo { color: var(--muted); }
        .c-out { color: var(--green); }
        .c-err { color: var(--red); }
        .c-dim { color: var(--dim); }
        .c-acc { color: var(--accent); }
        .c-info { color: #8884a0; }
        html.light .c-info { color: #6b6580; }
        html.light .term-shell { box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 0 0 1px rgba(184,117,31,0.1); }

        @media (max-width: 640px) {
            .term-shell { height: 96vh; max-height: none; border-radius: 0; border: none; }
            .term-links { display: none; }
        }
    </style>
</head>
<body>

<div class="term-shell">
    <div class="term-topbar">
        <div style="display:flex;align-items:center;gap:14px">
            <div class="term-dots">
                <div class="tdot r"></div>
                <div class="tdot y"></div>
                <div class="tdot g"></div>
            </div>
            <span class="term-label">zzz &mdash; terminal</span>
        </div>
        <div class="term-links">
            <a href="index.html">home</a>
            <a href="learn.html">learn</a>
        </div>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme" style="margin-left:8px">
            <i class="fa-solid fa-sun" id="themeIcon"></i><span id="themeLabel">Light</span>
        </button>
    </div>

    <div class="term-output" id="termOut"></div>

    <div class="term-bottom">
        <span class="term-prompt-text">zzz &gt;</span>
        <input type="text" class="term-field" id="termIn" autocomplete="off" spellcheck="false" disabled aria-label="Terminal input">
    </div>
</div>

<script src="zzz.js"></script>
<script>
(function() {
    var out = document.getElementById('termOut');
    var inp = document.getElementById('termIn');
    var buf = [];
    var hist = [];
    var hIdx = -1;

    function put(text, cls) {
        var d = document.createElement('div');
        d.textContent = text;
        if (cls) d.className = cls;
        out.appendChild(d);
        out.scrollTop = out.scrollHeight;
    }

    function runBuf() {
        if (buf.length === 0) {
            put('(nothing to run... type some code first)', 'c-dim');
            return;
        }
        try {
            var res = interpret(buf.join('\n'));
            if (res.length === 0) {
                put('(silent program... how mysterious)', 'c-dim');
            } else {
                for (var i = 0; i < res.length; i++) put(res[i], 'c-out');
            }
        } catch (e) {
            put(e.message, 'c-err');
        }
        buf.length = 0;
    }

    function showHelp() {
        var lines = [
            '  run        execute your buffered code',
            '  clear      clear the terminal screen',
            '  reset      clear code buffer only',
            '  help       show this message',
            '',
            '  everything else is treated as zzz code.',
            '  always start with "zzz", end with "nap".',
            '  use up/down arrows for history.',
        ];
        for (var i = 0; i < lines.length; i++) put(lines[i], 'c-info');
    }

    // Boot messages - direct, no async
    put('zzz-lang v0.1.0', 'c-acc');
    put('─────────────────────────────────────', 'c-dim');
    put('');
    put('type your code, line by line.', 'c-info');
    put('"run" to execute your program.', 'c-info');
    put('"help" for all commands.', 'c-info');
    put('"clear" to reset the screen.', 'c-info');
    put('"reset" to clear your code buffer.', 'c-info');
    put('');

    inp.disabled = false;
    inp.focus();

    inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            var val = inp.value;
            inp.value = '';
            hist.push(val);
            hIdx = hist.length;
            put('zzz > ' + val, 'c-echo');

            var cmd = val.trim().toLowerCase();
            if (cmd === 'run') {
                runBuf();
            } else if (cmd === 'clear') {
                out.innerHTML = '';
            } else if (cmd === 'help') {
                showHelp();
            } else if (cmd === 'reset') {
                buf.length = 0;
                put('(code buffer cleared)', 'c-dim');
            } else {
                buf.push(val);
            }
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (hIdx > 0) { hIdx--; inp.value = hist[hIdx]; }
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (hIdx < hist.length - 1) { hIdx++; inp.value = hist[hIdx]; }
            else { hIdx = hist.length; inp.value = ''; }
        }
    });

    out.addEventListener('click', function() { inp.focus(); });
})();
</script>
<script>
function applyTheme(light) {
    document.documentElement.classList.toggle('light', light);
    var icon = document.getElementById('themeIcon');
    var label = document.getElementById('themeLabel');
    if (icon) icon.className = light ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
    if (label) label.textContent = light ? 'Dark' : 'Light';
}
function toggleTheme() {
    var isLight = !document.documentElement.classList.contains('light');
    localStorage.setItem('zzz-theme', isLight ? 'light' : 'dark');
    applyTheme(isLight);
}
(function() { applyTheme(localStorage.getItem('zzz-theme') === 'light'); })();
</script>
</body>
</html>
