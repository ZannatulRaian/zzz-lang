<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zzz — terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0c0b10;
            --term-bg: #111018;
            --border: #252336;
            --fg: #ddd8cf;
            --muted: #706c82;
            --accent: #d43a3a;
            --green: #6db99a;
            --red: #c75050;
            --dim: #45425a;
            --topbar-bg: #181724;
        }
        html.light {
            --bg: #f4f4f6;
            --term-bg: #ffffff;
            --border: #e2e2e6;
            --fg: #111118;
            --muted: #777788;
            --accent: #b81f1f;
            --green: #3a8a68;
            --red: #b03030;
            --dim: #b0b0be;
            --topbar-bg: #f4f4f6;
        }

        /* Theme toggle button */
        .theme-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 10px;
            color: var(--muted);
            font-size: 11px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        .theme-btn:hover { color: var(--fg); border-color: var(--accent); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--fg);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mono { font-family: 'Fira Code', monospace; }

        .term-shell {
            width: 100%;
            max-width: 980px;
            height: 90vh;
            max-height: 760px;
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: var(--term-bg);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,148,58,0.06);
        }

        .term-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 13px 18px;
            background: var(--topbar-bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .term-dots { display: flex; gap: 7px; }
        .tdot { width: 11px; height: 11px; border-radius: 50%; }
        .tdot.r { background: #e05555; }
        .tdot.y { background: #d4943a; }
        .tdot.g { background: #6db99a; }
        .term-label {
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.03em;
        }
        .term-links { display: flex; gap: 16px; }
        .term-links a {
            font-size: 12px;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .term-links a:hover { color: var(--fg); }

        /* Split editor / output body */
        .term-body {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }
        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
        }
        .pane + .pane { border-left: 1px solid var(--border); }
        .pane-hd {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .pane-hd span.lbl {
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }
        .pane-hd-btns { display: flex; gap: 8px; align-items: center; }
        .pane-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 3px 9px;
            color: var(--muted);
            font-size: 10px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: color 0.2s, border-color 0.2s;
        }
        .pane-btn:hover { color: var(--fg); border-color: var(--accent); }

        #editor {
            flex: 1;
            width: 100%;
            resize: none;
            border: none;
            outline: none;
            background: var(--term-bg);
            color: var(--fg);
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.75;
            padding: 16px 18px;
            caret-color: var(--accent);
            tab-size: 2;
        }
        #editor::placeholder { color: var(--dim); }

        .term-output {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.9;
        }
        .term-output::-webkit-scrollbar, #editor::-webkit-scrollbar { width: 4px; }
        .term-output::-webkit-scrollbar-track { background: transparent; }
        .term-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .term-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 18px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--term-bg);
        }
        .run-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            padding: 9px 18px;
            color: var(--term-bg);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: filter 0.2s;
        }
        .run-btn:hover { filter: brightness(1.12); }
        .hint { font-size: 11px; color: var(--muted); font-family: 'Fira Code', monospace; }

        .c-echo { color: var(--muted); }
        .c-out { color: var(--green); }
        .c-err { color: var(--red); }
        .c-dim { color: var(--dim); }
        .c-acc { color: var(--accent); }
        .c-info { color: #8884a0; }
        html.light .c-info { color: #6b6580; }
        html.light .term-shell { box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 0 0 1px rgba(184,117,31,0.1); }

        @media (max-width: 760px) {
            .term-shell { height: 96vh; max-height: none; border-radius: 0; border: none; }
            .term-links { display: none; }
            .term-body { flex-direction: column; }
            .pane + .pane { border-left: none; border-top: 1px solid var(--border); }
        }
    </style>
</head>
<body>

<div class="term-shell">
    <div class="term-topbar">
        <div style="display:flex;align-items:center;gap:14px">
            <div class="term-dots">
                <div class="tdot r"></div>
                <div class="tdot y"></div>
                <div class="tdot g"></div>
            </div>
            <span class="term-label">zzz &mdash; terminal</span>
        </div>
        <div class="term-links">
            <a href="index.html">home</a>
            <a href="learn.html">learn</a>
        </div>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" aria-label="Toggle theme" style="margin-left:8px">
            <i class="fa-solid fa-sun" id="themeIcon"></i><span id="themeLabel">Light</span>
        </button>
    </div>

    <div class="term-body">
        <div class="pane">
            <div class="pane-hd">
                <span class="lbl">Editor</span>
                <div class="pane-hd-btns">
                    <button class="pane-btn" id="clearEditorBtn"><i class="fa-solid fa-eraser" style="margin-right:4px"></i>Clear</button>
                </div>
            </div>
            <textarea id="editor" class="mono" spellcheck="false" autocomplete="off" aria-label="Code editor" placeholder="zzz

yawn &quot;hello world&quot;

nap"></textarea>
        </div>
        <div class="pane">
            <div class="pane-hd">
                <span class="lbl">Output</span>
                <div class="pane-hd-btns">
                    <span class="hint" id="runTime"></span>
                    <button class="pane-btn" id="clearOutputBtn">Clear</button>
                </div>
            </div>
            <div class="term-output" id="termOut"></div>
        </div>
    </div>

    <div class="term-bottom">
        <button class="run-btn" id="runBtn"><i class="fa-solid fa-play" style="font-size:11px"></i>Run</button>
        <span class="hint">Ctrl / Cmd + Enter to run</span>
    </div>
</div>

<script src="zzz.js"></script>
<script>
(function() {
    var editor = document.getElementById('editor');
    var out = document.getElementById('termOut');
    var runTime = document.getElementById('runTime');

    function put(text, cls) {
        var d = document.createElement('div');
        d.textContent = text;
        if (cls) d.className = cls;
        out.appendChild(d);
        out.scrollTop = out.scrollHeight;
    }

    function run() {
        var src = editor.value;
        out.innerHTML = '';
        runTime.textContent = '';
        if (!src.trim()) {
            put('(nothing to run... write some code first)', 'c-dim');
            return;
        }
        var t0 = performance.now();
        try {
            var res = interpret(src);
            var ms = (performance.now() - t0).toFixed(2);
            if (res.length === 0) {
                put('(silent program... how mysterious)', 'c-dim');
            } else {
                for (var i = 0; i < res.length; i++) put(res[i], 'c-out');
            }
            runTime.textContent = ms + 'ms';
        } catch (e) {
            var ms2 = (performance.now() - t0).toFixed(2);
            put(e.message, 'c-err');
            runTime.textContent = ms2 + 'ms';
        }
    }

    document.getElementById('runBtn').addEventListener('click', run);

    document.getElementById('clearEditorBtn').addEventListener('click', function() {
        editor.value = '';
        editor.focus();
    });

    document.getElementById('clearOutputBtn').addEventListener('click', function() {
        out.innerHTML = '';
        runTime.textContent = '';
    });

    // Ctrl/Cmd+Enter to run, Tab to indent
    editor.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            run();
        }
        if (e.key === 'Tab') {
            e.preventDefault();
            var s = editor.selectionStart, en = editor.selectionEnd;
            editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(en);
            editor.selectionStart = editor.selectionEnd = s + 2;
        }
    });

    // Boot messages
    put('zzz-lang v0.1.0', 'c-acc');
    put('─────────────────────────────────────', 'c-dim');
    put('');
    put('write your code on the left.', 'c-info');
    put('hit Run or Ctrl/Cmd+Enter to execute.', 'c-info');
    put('');

    editor.value = 'zzz\n\nyawn "hello world"\n\nnap';
    editor.focus();
    editor.setSelectionRange(editor.value.length, editor.value.length);
})();
</script>
<script>
function applyTheme(light) {
    document.documentElement.classList.toggle('light', light);
    var icon = document.getElementById('themeIcon');
    var label = document.getElementById('themeLabel');
    if (icon) icon.className = light ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
    if (label) label.textContent = light ? 'Dark' : 'Light';
}
function toggleTheme() {
    var isLight = !document.documentElement.classList.contains('light');
    localStorage.setItem('zzz-theme', isLight ? 'light' : 'dark');
    applyTheme(isLight);
}
(function() { applyTheme(localStorage.getItem('zzz-theme') === 'light'); })();
</script>
</body>
</html>
